<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="Weather.css">
</head>
<body>
    <div class="card">
        <div class="welcome">
            <h1>Welcome to Weather App</h1>
            <p>Search any city to get live weather updates in Celsius.</p>
        </div>
        <div class="search">
            <input type="text" placeholder="Enter City Name" spellcheck="false">
            <button><img src="image/searchicon.png"></button>
        </div>
        <div class="error">
            <p>City Not Found</p>   
        </div>
        <div class="weather">
                <img src="image/rain.png" class="weather-icon">
                <h2 class="temperature">25°C</h2>
                <h3 class="city"> Delhi</h3>
                <div class="detail">
                    <div class="col">
                        <img src="image/humidity.png">
                        <div >
                            <p class="humidity">50%</p>
                            <p>Humidity</p>
                        </div>
                        
                    </div>
                     <div class="col">
                        <img src="image/wind.png">
                        <div >
                            <p class="wind">15 km/h</p>
                            <p>Wind Speed</p>
                        </div>
                        
                    </div>
                </div>
        </div>
        
    </div>
    <div class="credit">made by anubhav tripathi | anubhav.work1226@gmail.com</div>
    <script src="Weather.js"></script>




</body>
</html>
